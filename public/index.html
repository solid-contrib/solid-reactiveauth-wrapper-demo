<!-- This file is the entrypoint of the application. -->
<!-- It is viewable on http://localhost:8080/ after running `npm start`. -->
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Solid App 101</title>
        <script src="./main.js" type="module"></script>
    </head>
    <body>
        <form>
            <fieldset>
                <legend>Book</legend>
                <label>
                    <span>Title</span>
                    <input class="title" required>
                </label>
                <fieldset>
                    <legend>Author</legend>
                    <label>
                        <span>Name</span>
                        <input class="name" required>
                    </label>
                </fieldset>
            </fieldset>
            <button>Save</button>
        </form>
        <button class="load">Load</button>
        <button class="remove">Remove</button>
    </body>
</html>
